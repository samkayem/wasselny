<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasselny</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* تصميم مضغوط خاص بهذه الصفحة فقط، ليظهر كاملاً على شاشة الهاتف بدون أي تمرير */
  html, body { height: 100%; }
  body { display: flex; flex-direction: column; }
  .topbar { padding: 12px 18px; flex: 0 0 auto; }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 14px 16px;
    max-width: 480px;
  }
  main h1 { font-size: 19px; margin-bottom: 4px; }
  main > p.muted { margin: 0 0 14px; font-size: 13px; }
  .option-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .option-card .info h2 { font-size: 15px; margin: 0 0 2px; }
  .option-card .info p { font-size: 12px; margin: 0; line-height: 1.35; }
  .option-card a { flex: 0 0 auto; }
  .option-card button {
    width: auto;
    padding: 9px 16px;
    font-size: 13px;
    margin: 0;
    white-space: nowrap;
  }
  .stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
  .stat-box {
    flex: 1;
    background: white;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 8px;
    text-align: center;
  }
  .stat-box .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 800;
    color: var(--teal);
  }
  .stat-box .stat-lbl { font-size: 11px; color: #6b6452; margin-top: 2px; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Wasselny</span>
    <span class="tag">صيدا · نسخة تجريبية v1</span>
  </div>
  <main>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="ridersCount">—</div>
        <div class="stat-lbl">راكب مسجّل</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="driversCount">—</div>
        <div class="stat-lbl">سائق مسجّل</div>
      </div>
    </div>

    <h1>توصيلة أسرع داخل صيدا</h1>
    <p class="muted">اختر نوع حسابك للدخول أو التسجيل.</p>

    <div class="option-card">
      <div class="info">
        <h2>راكب</h2>
        <p>اطلب رحلة وشاهد أقرب السائقين.</p>
      </div>
      <a href="rider.html"><button class="btn-primary">دخول كراكب</button></a>
    </div>

    <div class="option-card">
      <div class="info">
        <h2>سائق</h2>
        <p>سجّل واستقبل طلبات الرحلات.</p>
      </div>
      <a href="driver.html"><button class="btn-secondary">دخول كسائق</button></a>
    </div>

    <div class="option-card">
      <div class="info">
        <h2>الإدارة</h2>
        <p>للفريق المسؤول عن التطبيق فقط.</p>
      </div>
      <a href="admin.html"><button class="btn-ghost">دخول الإدارة</button></a>
    </div>
  </main>

<script>
  fetch('/api/stats/public')
    .then((r) => r.json())
    .then((data) => {
      document.getElementById('ridersCount').textContent = data.ridersCount;
      document.getElementById('driversCount').textContent = data.driversCount;
    })
    .catch(() => {});
</script>
</body>
</html>
