<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wasselny — الإدارة</title>
<link rel="stylesheet" href="css/style.css">
<style>
  main { max-width: 720px; }
  #docOverlay {
    position: fixed; inset: 0; background: rgba(20,48,43,0.85);
    display: none; align-items: center; justify-content: center; z-index: 1000;
    flex-direction: column; gap: 12px; padding: 20px;
  }
  #docOverlay img { max-width: 100%; max-height: 70vh; border-radius: 10px; }
</style>
</head>
<body>
  <div class="topbar">
    <span class="brand">Wasselny</span>
    <span class="tag">لوحة الإدارة</span>
  </div>
  <main>

    <div id="authBox" class="card" style="display:none">
      <h2>تسجيل دخول الإدارة</h2>
      <form id="loginForm">
        <label>اسم المستخدم</label>
        <input name="username" required>
        <label>كلمة السر</label>
        <input name="password" type="password" required>
        <button class="btn-primary" type="submit">دخول</button>
      </form>
      <p class="muted">القيم الافتراضية الأولى: admin / admin123 — يجب تغييرها فوراً عبر متغيرات البيئة (انظر README).</p>
    </div>

    <div id="appBox" style="display:none">
      <div class="stat-grid" id="statsGrid"></div>

      <div class="tabs" style="margin-top:16px">
        <button id="tabDrivers" class="active">السائقون</button>
        <button id="tabTrips">الرحلات</button>
        <button id="tabComplaints">الشكاوى</button>
      </div>

      <div id="driversPane"></div>
      <div id="tripsPane" style="display:none"></div>
      <div id="complaintsPane" style="display:none"></div>

      <button class="btn-ghost" id="logoutBtn">تسجيل الخروج</button>
    </div>
  </main>

  <div id="docOverlay">
    <img id="docImg">
    <button class="btn-secondary" id="closeDocBtn" style="max-width:200px">إغلاق</button>
  </div>

<script src="js/api.js"></script>
<script>

// ---------- تسجيل الدخول ----------
document.getElementById('loginForm').onsubmit = async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    const data = await api('/auth/login-admin', { method: 'POST', body: { username: fd.get('username'), password: fd.get('password') } });
    setToken(data.token);
    localStorage.setItem('waslni_role', 'admin');
    showApp();
  } catch (err) { toast(err.message); }
};
document.getElementById('logoutBtn').onclick = () => { clearToken(); location.reload(); };

function showApp() {
  document.getElementById('authBox').style.display = 'none';
  document.getElementById('appBox').style.display = 'block';
  loadStats(); loadDrivers();
}

// ---------- التبويبات ----------
const panes = { drivers: 'driversPane', trips: 'tripsPane', complaints: 'complaintsPane' };
function showTab(name) {
  Object.values(panes).forEach(p => document.getElementById(p).style.display = 'none');
  document.getElementById(panes[name]).style.display = 'block';
  ['tabDrivers','tabTrips','tabComplaints'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById('tab' + name[0].toUpperCase() + name.slice(1)).classList.add('active');
}
document.getElementById('tabDrivers').onclick = () => { showTab('drivers'); loadDrivers(); };
document.getElementById('tabTrips').onclick = () => { showTab('trips'); loadTrips(); };
document.getElementById('tabComplaints').onclick = () => { showTab('complaints'); loadComplaints(); };

// ---------- إحصائيات ----------
async function loadStats() {
  try {
    const s = await api('/admin/stats');
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat"><div class="num">${s.verifiedDrivers}</div><div class="lbl">سائقون موثّقون</div></div>
      <div class="stat"><div class="num">${s.pendingDrivers}</div><div class="lbl">قيد المراجعة</div></div>
      <div class="stat"><div class="num">${s.availableNow}</div><div class="lbl">متوفرون الآن</div></div>
      <div class="stat"><div class="num">${s.completedTrips}</div><div class="lbl">رحلات مكتملة</div></div>
      <div class="stat"><div class="num">${s.openComplaints}</div><div class="lbl">شكاوى مفتوحة</div></div>
      <div class="stat"><div class="num">${s.totalRevenue}</div><div class="lbl">إجمالي الأجور المسجّلة</div></div>
    `;
  } catch (e) { toast(e.message); }
}

// ---------- السائقون ----------
async function loadDrivers() {
  try {
    const { drivers } = await api('/admin/drivers');
    const pane = document.getElementById('driversPane');
    if (!drivers.length) { pane.innerHTML = '<p class="muted">لا يوجد سائقون مسجّلون بعد.</p>'; return; }

    pane.innerHTML = drivers.map(d => `
      <div class="card">
        <div class="row" style="align-items:flex-start">
          <div>
            <a href="driver-account.html?id=${d.id}" style="color:var(--teal-dark); text-decoration:underline"><strong>${d.name}</strong></a> — ${d.phone}<br>
            <span class="muted">هوية: ${d.nationalId} · رخصة: ${d.licenseNumber}</span><br>
            ${d.verified
              ? `<span class="badge badge-ok">موثّق بواسطة ${d.verifiedBy}</span>`
              : `<span class="badge badge-wait">قيد المراجعة</span>`}
            ${d.active ? '' : '<span class="badge badge-danger">معطّل</span>'}
          </div>
        </div>
        <div class="row" style="margin-top:10px">
          ${!d.verified && d.hasPendingDocs ? `
            <button class="btn-sm btn-ghost" onclick="viewDoc(${d.id},'id')">عرض الهوية</button>
            <button class="btn-sm btn-ghost" onclick="viewDoc(${d.id},'license')">عرض الرخصة</button>
          ` : ''}
          ${!d.verified ? `<button class="btn-sm btn-primary" onclick="verifyDriver(${d.id})">تأكيد التحقق</button>` : ''}
          <button class="btn-sm ${d.active ? 'btn-danger' : 'btn-secondary'}" onclick="toggleActive(${d.id})">
            ${d.active ? 'تعطيل الحساب' : 'إعادة تفعيل'}
          </button>
          <button class="btn-sm btn-danger" onclick="deleteDriver(${d.id}, '${d.name.replace(/'/g, "\\'")}')">حذف نهائي</button>
        </div>
      </div>
    `).join('');
  } catch (e) { toast(e.message); }
}

async function viewDoc(id, type) {
  try {
    const res = await fetch(`/api/admin/drivers/${id}/document/${type}`, {
      headers: { Authorization: 'Bearer ' + getToken() }
    });
    if (!res.ok) {
      let msg = `تعذّر عرض الملف (خطأ ${res.status})`;
      try { const data = await res.json(); if (data.error) msg += ': ' + data.error; } catch (e) {}
      toast(msg);
      return;
    }
    const blob = await res.blob();
    document.getElementById('docImg').src = URL.createObjectURL(blob);
    document.getElementById('docOverlay').style.display = 'flex';
  } catch (e) { toast('تعذّر عرض الملف (خطأ شبكة): ' + e.message); }
}
document.getElementById('closeDocBtn').onclick = () => { document.getElementById('docOverlay').style.display = 'none'; };

async function verifyDriver(id) {
  const verifiedBy = prompt('اسمك (للتسجيل في سجل التحقق):', 'الإدارة');
  if (verifiedBy === null) return;
  try {
    await api(`/admin/drivers/${id}/verify`, { method: 'POST', body: { verifiedBy } });
    toast('تم تأكيد التحقق وحذف الصور');
    loadDrivers(); loadStats();
  } catch (e) { toast(e.message); }
}
async function toggleActive(id) {
  try {
    await api(`/admin/drivers/${id}/toggle-active`, { method: 'POST' });
    loadDrivers();
  } catch (e) { toast(e.message); }
}

async function deleteDriver(id, name) {
  if (!confirm(`هل أنت متأكد من حذف "${name}" نهائياً؟ لا يمكن التراجع عن هذا الإجراء.`)) return;
  try {
    await api(`/admin/drivers/${id}`, { method: 'DELETE' });
    toast('تم الحذف نهائياً');
    loadDrivers(); loadStats();
  } catch (e) { toast(e.message); }
}

// ---------- الرحلات ----------
async function loadTrips() {
  try {
    const { trips } = await api('/admin/trips');
    const pane = document.getElementById('tripsPane');
    if (!trips.length) { pane.innerHTML = '<p class="muted">لا توجد رحلات بعد.</p>'; return; }
    pane.innerHTML = `<div class="card"><table>
      <tr><th>الراكب</th><th>السائق</th><th>الحالة</th><th>السعر</th><th></th></tr>
      ${trips.map(t => `
        <tr>
          <td>${t.riderName}</td>
          <td>${t.driverName}</td>
          <td>${tripStatusAr(t.status)}</td>
          <td>${t.price ?? '—'}</td>
          <td><button class="btn-sm btn-ghost" onclick="editPrice(${t.id}, '${t.price ?? ''}')">تعديل السعر</button></td>
        </tr>
      `).join('')}
    </table></div>`;
  } catch (e) { toast(e.message); }
}
function tripStatusAr(s) {
  return { requested: 'بانتظار السائق', accepted: 'جارية', completed: 'مكتملة', cancelled: 'ملغاة' }[s] || s;
}
async function editPrice(id, current) {
  const price = prompt('السعر الجديد:', current);
  if (price === null) return;
  try {
    await api(`/admin/trips/${id}/price`, { method: 'POST', body: { price } });
    toast('تم تحديث السعر');
    loadTrips(); loadStats();
  } catch (e) { toast(e.message); }
}

// ---------- الشكاوى ----------
async function loadComplaints() {
  try {
    const { complaints } = await api('/admin/complaints');
    const pane = document.getElementById('complaintsPane');
    if (!complaints.length) { pane.innerHTML = '<p class="muted">لا توجد شكاوى.</p>'; return; }
    pane.innerHTML = complaints.map(c => `
      <div class="card">
        <p>${c.description}</p>
        <p class="muted">رحلة #${c.tripId} · راكب: ${c.riderName} · سائق: ${c.driverName} · بواسطة: ${c.submittedBy === 'rider' ? 'الراكب' : 'السائق'}</p>
        ${c.resolved
          ? '<span class="badge badge-ok">تمت المعالجة</span>'
          : `<button class="btn-sm btn-primary" onclick="resolveComplaint(${c.id})">وضع علامة "تمت المعالجة"</button>`}
      </div>
    `).join('');
  } catch (e) { toast(e.message); }
}
async function resolveComplaint(id) {
  try {
    await api(`/admin/complaints/${id}/resolve`, { method: 'POST' });
    loadComplaints(); loadStats();
  } catch (e) { toast(e.message); }
}

// ---------- البدء ----------
if (getToken() && localStorage.getItem('waslni_role') === 'admin') {
  showApp();
} else {
  document.getElementById('authBox').style.display = 'block';
}
</script>
</body>
</html>
